<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirral PROW - Route Editor</title>
    <link rel="stylesheet" href="vendor/leaflet.css" />
    <link rel="stylesheet" href="css/editor.css" />
</head>
<body>
    <div id="map"></div>
    <div class="editor-panel">
        <h2>Route Editor</h2>
        <div id="status" class="status status-info">Loading route...</div>

        <div class="section">
            <p><strong>Step 1: Cut a bad section</strong></p>
            <p>Click two vertices to select a range, then delete everything between them.</p>
            <button id="btnSelectRange">Select Range to Cut</button>
            <button id="btnDeleteRange" class="danger" style="display:none">Delete Selected Range</button>
            <button id="btnCancelSelect" style="display:none">Cancel Selection</button>
        </div>

        <div class="section">
            <p><strong>Step 2: Draw replacement</strong></p>
            <p>Click sequentially on the map to draw new path points. They get inserted at the cut location.</p>
            <button id="btnDraw">Start Drawing</button>
            <button id="btnFinishDraw" class="active" style="display:none">Finish Drawing</button>
        </div>

        <div class="section">
            <p><strong>Import / Export</strong></p>
            <button id="btnImport">Import JSON file</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
            <button id="btnUndo">Undo</button>
            <button id="btnExport" class="primary">Export Route JSON</button>
        </div>

        <p style="margin-top:8px;font-size:11px;color:#999;">Points: <span id="pointCount">0</span></p>
    </div>

    <script src="vendor/leaflet.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
