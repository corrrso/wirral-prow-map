<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wirral PROW Walking Route</title>
    <link rel="stylesheet" href="vendor/leaflet.css" />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <div id="map"></div>
    <div class="route-info">
      <h2>Wirral PROW Walking Route</h2>
      <div class="stats">
        <strong>Distance:</strong> ~40.7 km (25.3 miles)<br />
        <strong>Type:</strong> Walking (Public Rights of Way)<br />
        <strong>Area:</strong> Wirral Peninsula, Merseyside
      </div>
      <ul class="waypoint-list">
        <li>
          <span class="wp-number start">A</span> Hadlow Road Station, Willaston
        </li>
        <li><span class="wp-number">2</span> Thornton</li>
        <li><span class="wp-number">3</span> Landican</li>
        <li><span class="wp-number">4</span> Arrowe Park area</li>
        <li><span class="wp-number">5</span> Thurstaston Hill area</li>
        <li><span class="wp-number">6</span> Meols beach</li>
        <li><span class="wp-number end">B</span> Moreton beach</li>
      </ul>
    </div>

    <script src="vendor/leaflet.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
